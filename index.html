<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --accent: #3498db; --success: #27ae60; --bg: #f0f2f5; --error: #e74c3c; --dark: #2c3e50; --highlight: #f1c40f; --purple: #9b59b6; --teal: #16a085; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--bg); margin: 0; padding: 10px; }
        #container { max-width: 950px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        #target-display { font-size: 110px; font-weight: bold; color: var(--accent); height: 140px; display: flex; align-items: center; justify-content: center; margin: 10px 0; letter-spacing: 10px; }
        .pulse { animation: pulseAni 0.3s ease-out; }
        @keyframes pulseAni { 0% {transform: scale(1);} 50% {transform: scale(1.1); color: #e67e22;} 100% {transform: scale(1);} }

        #kb-container { display: flex; justify-content: center; gap: 8px; margin: 15px 0; background: #eee; padding: 15px; border-radius: 12px; min-height: 65px; border: 2px solid #ddd; }
        .v-key { width: 55px; height: 55px; background: white; border: 2px solid #ccc; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; transition: 0.2s; }
        .v-key.active { background: var(--highlight); border-color: #e67e22; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .v-divider { width: 4px; background: #bbb; margin: 0 15px; border-radius: 2px; }

        #speed-test-view { display: none; text-align: left; background: #fff; padding: 15px; border: 2px solid #ddd; border-radius: 10px; margin: 20px 0; }
        #target-text { font-family: 'Courier New', monospace; font-size: 22px; color: #95a5a6; margin-bottom: 10px; line-height: 1.5; }
        #typing-box { font-family: 'Courier New', monospace; font-size: 24px; width: 95%; height: 60px; padding: 10px; border: 3px solid var(--accent); border-radius: 8px; outline: none; }

        .stats { font-size: 20px; color: var(--dark); margin-bottom: 10px; background: #e8f4fd; padding: 10px; border-radius: 10px; display: inline-block; }
        .menu { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .row-box { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 10px; border-radius: 12px; }
        
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 0.75em; transition: 0.2s; line-height: 1.3; min-width: 110px; }
        button span { display: block; font-size: 1.3em; text-transform: uppercase; margin-top: 2px; }
        button:hover { transform: scale(1.05); filter: brightness(1.1); }
        .active-btn { outline: 4px solid var(--dark); }
        .test-btn { background: #34495e !important; border: 1px solid white; min-width: 90px; }
        
        #finish-msg { display: none; background: var(--success); color: white; padding: 25px; border-radius: 15px; margin: 20px 0; font-size: 1.6em; animation: bounce 0.5s; font-weight: bold; }
        @keyframes bounce { 0%, 100% {transform: translateY(0);} 50% {transform: translateY(-10px);} }
        #error-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(231, 76, 60, 0.8); color: white; font-size: 300px; display: none; align-items: center; justify-content: center; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>

<div id="error-overlay">X</div>

<div id="container">
    <h1>🏁 ТРЕНАЖОРЪТ НА БОБИ</h1>
    <div id="finish-msg">🌟 БРАВО, БОБИ! ТИ СИ ГОТОВ! <br> СЕГА ИЗБЕРИ ДРУГИ ПРЪСТИ! 🌟</div>

    <div id="game-ui">
        <div id="stats-container" class="stats">Прогрес: <span id="progress-bar">0</span> / 40</div>
        
        <div id="practice-display-group">
            <div id="target-display">?</div>
            <div id="hint" style="color: #7f8c8d; font-weight: bold; margin-bottom: 10px;">Избери ниво...</div>
            <div id="kb-container"></div>
        </div>

        <div id="speed-test-view">
            <div id="target-text"></div>
            <textarea id="typing-box" spellcheck="false" placeholder="Пиши тук и натисни ENTER за край..."></textarea>
            <div id="speed-result" style="margin-top:10px; font-weight:bold; color:var(--dark);"></div>
        </div>

        <div class="menu">
            <!-- ГОРЕН РЕД -->
            <div class="row-box" style="background: rgba(155, 89, 182, 0.1);">
                <button style="background:var(--purple)" onclick="changeLevel(['и', 'к'], 'Горен', this)">ПОКАЗАЛЦИ <span>И К</span></button>
                <button style="background:var(--purple)" onclick="changeLevel(['е', 'с'], 'Горен', this)">СРЕДНИ <span>Е С</span></button>
                <button style="background:var(--purple)" onclick="changeLevel(['у', 'д'], 'Горен', this)">БЕЗИМЕННИ <span>У Д</span></button>
                <button style="background:var(--purple)" onclick="changeLevel(['з', ',', 'ц'], 'Горен', this)">КУТРЕТА <span>З , Ц</span></button>
                <button class="test-btn" onclick="startTest('top', this)">🏁 ТЕСТ <span>ГОРЕН</span></button>
            </div>
            <!-- ОСНОВЕН РЕД -->
            <div class="row-box" style="background: rgba(52, 152, 219, 0.1);">
                <button style="background:var(--accent)" onclick="changeLevel(['о', 'т'], 'Основен', this)">ПОКАЗАЛЦИ <span>О Т</span></button>
                <button style="background:var(--accent)" onclick="changeLevel(['н', 'а'], 'Основен', this)">СРЕДНИ <span>Н А</span></button>
                <button style="background:var(--accent)" onclick="changeLevel(['в', 'я'], 'Основен', this)">БЕЗИМЕННИ <span>В Я</span></button>
                <button style="background:var(--accent)" onclick="changeLevel(['м', 'ь', 'ч'], 'Основен', this)">КУТРЕТА <span>М Ь Ч</span></button>
                <button class="test-btn" onclick="startTest('mid', this)">🏁 ТЕСТ <span>СИН</span></button>
            </div>
            <!-- ДОЛЕН РЕД -->
            <div class="row-box" style="background: rgba(22, 160, 133, 0.1);">
                <button style="background:var(--teal)" onclick="changeLevel(['э', 'ф', 'х', 'п'], 'Долен', this)">ПОКАЗАЛЦИ <span>Э Ф Х П</span></button>
                <button style="background:var(--teal)" onclick="changeLevel(['ъ', 'р'], 'Долен', this)">СРЕДНИ <span>Ъ Р</span></button>
                <button style="background:var(--teal)" onclick="changeLevel(['й', 'л'], 'Долен', this)">БЕЗИМЕННИ <span>Й Л</span></button>
                <button style="background:var(--teal)" onclick="changeLevel(['ю', 'б'], 'Долен', this)">КУТРЕТА <span>Ю Б</span></button>
                <button class="test-btn" onclick="startTest('bot', this)">🏁 ТЕСТ <span>ЗЕЛЕН</span></button>
            </div>
        </div>
    </div>
</div>

<script>
    const layouts = {
        'Горен': ['я', 'у', 'е', 'и', 'ш', '|', 'щ', 'к', 'с', 'д', 'з', 'ц', ','],
        'Основен': ['ь', 'я', 'а', 'о', 'ж', '|', 'г', 'т', 'н', 'в', 'м', 'ч'],
        'Долен': ['ю', 'ъ', 'э', 'ф', 'х', '|', 'п', 'р', 'л', 'з', 'й', 'б']
    };

    const testTexts = {
        mid: "ана вярва на таня. мачът на ваня е на гарата. мама готви на ната.",
        top: "кучето и котката скочиха. ще ядем ягоди и ябълки. тук е много шумно.",
        bot: "лекар даде разни хапчета. зимата дойде бързо. пази хляба от прах."
    };

    let mode = 'practice';
    let currentLetters = [];
    let targetString = '';
    let typedInString = '';
    let successCount = 0;
    let startTime = null;

    function changeLevel(letters, rowName, btn) {
        mode = 'practice';
        currentLetters = letters;
        successCount = 0;
        document.getElementById('finish-msg').style.display = 'none';
        document.getElementById('practice-display-group').style.display = 'block';
        document.getElementById('speed-test-view').style.display = 'none';
        document.getElementById('stats-container').style.display = 'inline-block';
        document.querySelectorAll('button').forEach(b => b.classList.remove('active-btn'));
        btn.classList.add('active-btn');
        buildKeyboard(rowName);
        nextTask();
    }

    function buildKeyboard(rowName) {
        const container = document.getElementById('kb-container');
        container.innerHTML = '';
        layouts[rowName].forEach(char => {
            if (char === '|') {
                const div = document.createElement('div');
                div.className = 'v-divider';
                container.appendChild(div);
            } else {
                const key = document.createElement('div');
                key.className = 'v-key';
                key.id = 'vkey-' + (char === ',' ? 'comma' : char);
                key.innerText = char.toUpperCase();
                container.appendChild(key);
            }
        });
    }

    function nextTask() {
        if (successCount >= 40) {
            document.getElementById('finish-msg').style.display = 'block';
            document.getElementById('practice-display-group').style.display = 'none';
            document.getElementById('stats-container').style.display = 'none';
            return;
        }

        typedInString = '';
        if (successCount < 10) {
            targetString = currentLetters[successCount % currentLetters.length];
            document.getElementById('hint').innerText = "Стъпка 1: Симетрично учене";
        } else if (successCount < 25) {
            targetString = currentLetters[Math.floor(Math.random() * currentLetters.length)];
            document.getElementById('hint').innerText = "Стъпка 2: Разбъркани букви";
        } else {
            let c1 = currentLetters[Math.floor(Math.random() * currentLetters.length)];
            let c2 = currentLetters[Math.floor(Math.random() * currentLetters.length)];
            targetString = c1 + c2;
            document.getElementById('hint').innerText = "Стъпка 3: Комбинации (Срички)";
        }
        updateDisplay();
    }

    function updateDisplay() {
        const display = document.getElementById('target-display');
        display.innerText = targetString.toUpperCase();
        display.classList.add('pulse');
        setTimeout(() => display.classList.remove('pulse'), 300);

        document.querySelectorAll('.v-key').forEach(k => k.classList.remove('active'));
        const nextCharToHit = targetString[typedInString.length];
        const keyId = nextCharToHit === ',' ? 'vkey-comma' : 'vkey-' + nextCharToHit;
        const activeKey = document.getElementById(keyId);
        if (activeKey) activeKey.classList.add('active');
        document.getElementById('progress-bar').innerText = successCount;
    }

    window.onkeydown = function(e) {
        if (mode === 'practice') {
            if (successCount >= 40) return;
            let pressed = e.key.toLowerCase();
            let expected = targetString[typedInString.length];

            if (pressed === expected) {
                typedInString += pressed;
                if (typedInString.length === targetString.length) {
                    successCount += targetString.length;
                    nextTask();
                } else {
                    document.querySelectorAll('.v-key').forEach(k => k.classList.remove('active'));
                    const nextChar = targetString[typedInString.length];
                    const keyId = nextChar === ',' ? 'vkey-comma' : 'vkey-' + nextChar;
                    document.getElementById(keyId).classList.add('active');
                }
            } else if (e.key.length === 1) showError();
        } else if (mode === 'test') {
            if (!startTime && e.key.length === 1) startTime = Date.now();
            if (e.key === 'Enter') {
                e.preventDefault();
                const typed = document.getElementById('typing-box').value;
                const time = (Date.now() - startTime) / 60000;
                let err = 0;
                for(let i=0; i<activeTestString.length; i++) if(typed[i] !== activeTestString[i]) err++;
                let wpm = Math.round((typed.length - (err*10)) / time);
                document.getElementById('speed-result').innerText = `РЕЗУЛТАТ: ${wpm < 0 ? 0 : wpm} удара/мин (Грешки: ${err})`;
            }
        }
    };

    function startTest(type, btn) {
        mode = 'test';
        activeTestString = testTexts[type];
        startTime = null;
        document.getElementById('practice-display-group').style.display = 'none';
        document.getElementById('stats-container').style.display = 'none';
        document.getElementById('finish-msg').style.display = 'none';
        document.getElementById('speed-test-view').style.display = 'block';
        document.getElementById('target-text').innerText = activeTestString;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active-btn'));
        btn.classList.add('active-btn');
        const box = document.getElementById('typing-box'); box.value = ""; setTimeout(() => box.focus(), 100);
    }

    function showError() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = audioCtx.createOscillator(); osc.type = 'sawtooth'; osc.frequency.value = 130;
        osc.connect(audioCtx.destination); osc.start(); setTimeout(() => osc.stop(), 200);
        document.getElementById('error-overlay').style.display = 'flex';
        setTimeout(() => document.getElementById('error-overlay').style.display = 'none', 200);
    }
</script>
</body>
</html>
